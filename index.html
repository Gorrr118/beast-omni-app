<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beast Omni - Главная</title>
    <link rel="stylesheet" href="css/splash.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

    <div id="splash-screen">
        <div class="logo-wrapper">
            <img src="img/logo-white.png" alt="Beast Omni Logo" class="logo-pulse">
            <p class="tagline">Automatic Choice. Beast Omni.</p>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <nav class="bottom-navbar">
        <a href="#" class="nav-item active">
            <img src="img/icon-home-purple.svg" alt="Home">
            <span>Главная</span>
        </a>
        <a href="referral.html" class="nav-item">
            <img src="img/icon-referral.svg" alt="Referral">
            <span>Рефералка</span>
        </a>
        <a href="widgets.html" class="nav-item">
            <img src="img/icon-widget.svg" alt="Widgets">
            <span>Виджеты</span>
        </a>
        <a href="shop.html" class="nav-item">
            <img src="img/icon-shop.svg" alt="Shop">
            <span>Магазин</span>
        </a>
    </nav>

    <main class="content-wrapper home-page main-hidden">
        
        <header class="home-header">
            <div class="user-info">
                <h1>Привет, filatow!</h1>
                <p>Добро пожаловать в командный центр.</p>
            </div>
            <div class="balance-card">
                <span>Баланс:</span>
                <span class="amount">$12.50</span>
            </div>
        </header>

        <section class="card tariff-card">
            <div class="tariff-info">
                <h2>PRO BEAST</h2>
                <ul>
                    <li>10 Виджетов</li>
                    <li>Премиум шрифты</li>
                    <li>Без водяного знака</li>
                </ul>
            </div>
            <button class="btn btn-purple">Продлить тарифов</button>
        </section>

        <section class="home-widgets-section">
            <div class="section-header">
                <h2>Твои виджеты</h2>
                <a href="widgets.html" class="link-all">Все (7)</a>
            </div>
            
            <div class="widget-list">
                <div class="widget-item">
                    <div class="widget-preview">
                        <img src="img/char-preview-wednesday.png" alt="Preview Wednesday">
                    </div>
                    <div class="widget-details">
                        <h3>Wednesday Stream</h3>
                        <p>Шрифт: Cyber Neon</p>
                    </div>
                    <div class="widget-actions">
                        <button class="btn-icon btn-copy-link"></button>
                        <button class="btn-icon btn-edit"></button>
                    </div>
                </div>
            </div>

            <button class="btn btn-add-widget btn-pulse">+ Создать видже</button>
        </section>

        <section class="home-shop-section">
            <div class="section-header">
                <h2>Магазин: Новинки</h2>
            </div>
            <div class="shop-previews">
                <div class="shop-item-prew">
                    <img src="img/char-preview-witcher.png" alt="Geralt">
                    <span>$4.99</span>
                </div>
                </div>
            <button class="btn btn-purple-outline">Перейти в магазин</button>
        </section>

    </main>

    <script src="js/splash.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
