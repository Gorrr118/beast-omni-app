<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo">BEAST OMNI</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <div style="width: 8px; height: 8px; background: var(--accent-blue); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--accent-blue);"></div>
            <h1 id="user-name">BEAST CORE</h1>
        </div>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru" selected>🇷🇺 RU</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <div class="feed">
        <div class="main-video-card">
            <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe">
                <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
            </video>
            <div class="video-label" id="l-creation">ULTIMATE GENERATION 2.0</div>
        </div>

        <button class="btn-main-action" id="l-create-btn" onclick="tg.showAlert('Initializing Neural Core...')">ЗАПУСТИТЬ ТЕРМИНАЛ</button>

        <div class="info-block" style="margin-top:60px;">
            <div class="info-text">
                <b id="l-title-project">ЭКОСИСТЕМА BEAST OMNI</b>
                <span id="l-desc-project"></span>
            </div>
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="info-text"><b id="l-title-plans">ТАРИФНЫЕ ПЛАНЫ</b></div>
            <div id="packages-container"></div>
            <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1000" class="info-img" style="margin-top:20px;">
        </div>

        <div class="info-block">
            <div class="info-text">
                <b id="l-title-sec">БЕЗОПАСНОСТЬ ДАННЫХ</b>
                <span id="l-desc-sec"></span>
            </div>
            <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="info-text">
                <b id="l-title-pay">СПОСОБЫ ОПЛАТЫ</b>
                <span id="l-desc-pay"></span>
            </div>
            <img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="beast-card">
                <b id="l-title-supp">ЭЛИТНАЯ ПОДДЕРЖКА 24/7</b>
                <p id="l-desc-supp"></p>
                <button class="btn-support" id="l-btn-supp" onclick="tg.openTelegramLink('https://t.me/your_support_bot')">СВЯЗАТЬСЯ С ПОДДЕРЖКОЙ</button>
            </div>
        </div>
    </div>

    <div id="refs-screen" style="display:none; position:fixed; inset:0; background:#000; z-index:1500; overflow-y:auto; padding: 0 20px 120px;">
        <div style="padding-top: 60px; text-align: center; margin-bottom: 20px;">
            <h2 id="ref-title" style="font-family: Montserrat; font-weight: 900; font-size: 28px; letter-spacing: 1px; color: #fff; margin: 0;">РЕФЕРАЛЬНАЯ СИСТЕМА</h2>
            <div style="width: 50px; height: 2px; background: var(--accent-blue); margin: 15px auto;"></div>
        </div>
        <div class="info-text" style="text-align: center; margin-bottom: 30px;">
            <span id="ref-desc" style="font-size: 14px; line-height: 1.6; color: var(--text-dim);"></span>
        </div>
        <div style="width: 100%; height: 180px; border-radius: 24px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border-soft);">
            <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1000" style="width: 100%; height: 100%; object-fit: cover; opacity: 0.8;">
        </div>
        <div class="beast-card" style="margin-bottom: 30px;">
            <span style="color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">Доступно для обмена</span>
            <div style="font-family: Montserrat; font-weight: 900; font-size: 48px; margin: 5px 0; color: #fff;">0.00 <span style="color: var(--accent-blue); font-size: 18px;">STARS</span></div>
        </div>
        <button class="btn-main-action" onclick="sharePartnerLink()">
            <span id="ref-btn-text">ПРИГЛАСИТЬ ДРУГА</span>
        </button>
        <div class="back-btn" style="text-align:center; margin-top:40px;" onclick="closeRefs()">← ВЕРНУТЬСЯ В ТЕРМИНАЛ</div>
    </div>

    <div class="tab-bar">
        <a href="#" class="nav-item active" id="tab-home" onclick="closeRefs()">ГЛАВНАЯ</a>
        <a href="#" class="nav-item" id="tab-stats" onclick="tg.showAlert('Stats coming soon')">СТАТЫ</a>
        <a href="#" class="nav-item" id="tab-refs" onclick="openRefs()">РЕФЫ</a>
        <a href="#" class="nav-item" id="tab-plans" onclick="closeRefs(); window.scrollTo({top: document.getElementById('l-title-plans').offsetTop - 100, behavior: 'smooth'})">ТАРИФЫ</a>
        <a href="#" class="nav-item" id="tab-gift" onclick="openGiftModal()">БОНУС</a>
    </div>

    <div id="gift-modal">
        <h2 id="l-lucky">BEAST LUCK</h2>
        <div class="wheel-container">
            <div class="wheel-pointer"></div>
            <canvas id="wheel-canvas" width="600" height="600"></canvas>
        </div>
        <button class="btn-main-action" style="max-width: 280px;" onclick="runWheel()" id="l-spin">КРУТИТЬ КОЛЕСО</button>
        <div class="back-btn" onclick="closeGiftModal()" id="l-back">← НАЗАД</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
