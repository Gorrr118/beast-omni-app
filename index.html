<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beast Omni Ultimate Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-logo">BEAST OMNI</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
    </div>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <div style="width: 8px; height: 8px; background: var(--accent-blue); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--accent-blue);"></div>
            <h1 id="user-name">BEAST CORE</h1>
        </div>
        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="ru" selected>🇷🇺 RU</option>
            <option value="en">🇺🇸 EN</option>
        </select>
    </div>

    <div class="feed">
        <div class="main-video-card">
            <video autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe">
                <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
            </video>
            <div class="video-label" id="l-creation">ULTIMATE GENERATION 3.0 — ONLINE</div>
        </div>

        <button class="btn-main-action" id="l-create-btn" onclick="window.location.href='terminal.html'">ЗАПУСТИТЬ ТЕРМИНАЛ</button>

        <div class="info-block" style="margin-top:60px;">
            <div class="info-text">
                <b id="l-title-project">ЭКОСИСТЕМА BEAST OMNI</b>
                <span id="l-desc-project">
                    </span>
            </div>
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="info-text"><b id="l-title-plans" style="color: var(--accent-blue);">ПРИОРИТЕТНЫЙ ТРАФИК</b></div>
            <div id="packages-container">
                </div>
            <img src="https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=1000" class="info-img" style="margin-top:20px;">
        </div>

        <div class="info-block">
            <div class="info-text">
                <b id="l-title-sec" style="color: #00ff88;">БЕЗОПАСНОСТЬ ELITE</b>
                <span id="l-desc-sec">
                    </span>
            </div>
            <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="info-text">
                <b id="l-title-pay" style="color: #FFD700;">СПОСОБЫ ОПЛАТЫ</b>
                <span id="l-desc-pay">
                    </span>
            </div>
            <img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?q=80&w=1000" class="info-img">
        </div>

        <div class="info-block">
            <div class="beast-card">
                <b id="l-title-supp">ЭЛИТНАЯ ПОДДЕРЖКА 24/7</b>
                <p id="l-desc-supp">Ваш Beast Core под защитой лучших специалистов.</p>
                <button class="btn-support" id="l-btn-supp" onclick="window.location.href='https://t.me/your_support_bot'">СВЯЗАТЬСЯ С ПОДДЕРЖКОЙ</button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="nav-item active">ГЛАВНАЯ</a>
        <a href="terminal.html" class="nav-item">ТЕРМИНАЛ</a>
        <a href="referals.html" class="nav-item">РЕФЫ</a>
        <a href="shop.html" class="nav-item">ТАРИФЫ</a>
        <a href="bonus.html" class="nav-item">БОНУС</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
